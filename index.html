<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1 id="welcome">Welcome to My Portfolio</h1>

<button id="darkBtn">🌙 Dark Mode</button>
</header>

<section>

<h2>About Me</h2>

<p id="aboutText">
I am a Computer Science Engineering Student.
</p>

<button id="changeText">
Know More
</button>

</section>

<section>

<h2>Image Gallery</h2>
<img id="gallery" src="images/myphoto.jpg.jpg" alt="My Profile Photo" width="250">
<br><br>

<button id="prev">Previous</button>
<button id="next">Next</button>

</section>

<section>

<h2>Contact Me</h2>

<form id="contactForm">

<input
type="text"
id="name"
placeholder="Your Name">

<br><br>

<input
type="email"
id="email"
placeholder="Your Email">

<br><br>

<textarea
id="message"
placeholder="Your Message"></textarea>

<br><br>

<button type="submit">
Send
</button>

</form>

<p id="error"></p>

</section>

<script src="script.js"></script>

</body>
</html>
